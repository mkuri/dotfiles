set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",alacritty:RGB"

unbind C-b
set -g prefix C-s

bind s split-window -v
bind v split-window -h

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set-option -g mouse on
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind-key -n WheelDownPane select-pane -t= \; send-keys -M

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line

# OS-agnostic clipboard integration with priority fallback
# Priority: pbcopy (macOS) > wl-copy (Wayland) > xclip (X11) > xsel (X11) > tmux buffer
run-shell 'if command -v pbcopy > /dev/null 2>&1; then \
    tmux bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"; \
    tmux bind-key -T copy-mode-vi Y send -X copy-pipe-and-cancel "pbcopy"; \
elif command -v wl-copy > /dev/null 2>&1; then \
    tmux bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"; \
    tmux bind-key -T copy-mode-vi Y send -X copy-pipe-and-cancel "wl-copy"; \
elif command -v xclip > /dev/null 2>&1; then \
    tmux bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"; \
    tmux bind-key -T copy-mode-vi Y send -X copy-pipe-and-cancel "xclip -selection clipboard"; \
elif command -v xsel > /dev/null 2>&1; then \
    tmux bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel -b"; \
    tmux bind-key -T copy-mode-vi Y send -X copy-pipe-and-cancel "xsel -b"; \
else \
    tmux bind-key -T copy-mode-vi y send -X copy-selection; \
    tmux bind-key -T copy-mode-vi Y send -X copy-line; \
fi'

unbind Space

bind-key g switch-client -T git-map
bind-key -T git-map g display-popup -d "#{pane_current_path}" -E -w 90% -h 90% "lazygit"
bind-key -T git-map d display-popup -d "#{pane_current_path}" -E -w 90% -h 90% "gh dash"

setw -g window-active-style 'bg=#0f1117'
setw -g window-style 'bg=default'
